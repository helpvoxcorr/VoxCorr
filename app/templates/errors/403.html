{% extends "base.html" %}
{% block title %}Accès refusé — VoxCorr{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:60vh">
  <div class="text-center" style="max-width:480px">
    <div style="font-size:6rem;font-weight:800;color:#f59e0b;line-height:1;letter-spacing:-4px">403</div>
    <h2 class="fw-bold mt-2 mb-1">Accès refusé</h2>
    <p class="text-muted mb-4">
      Vous n'avez pas les droits pour accéder à cette ressource.<br>
      Si vous pensez qu'il s'agit d'une erreur, contactez l'administrateur.
    </p>
    <div class="d-flex gap-2 justify-content-center">
      <button onclick="history.back()" class="btn vox-btn-outline">
        <i class="bi bi-arrow-left me-1"></i>Retour
      </button>
      <a href="{{ url_for('teacher.dashboard') if current_user.is_authenticated else url_for('auth.login') }}"
         class="btn vox-btn-primary">
        <i class="bi bi-house me-1"></i>Accueil
      </a>
    </div>
  </div>
</div>
{% endblock %}
